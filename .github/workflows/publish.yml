name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      # Trusted publishing (OIDC) needs npm >= 11.5.1; node 22 ships npm 10.x.
      # Pinned to the 11.x line: `npm@latest` bit us on 2026-07-10 when npm
      # 12.0.0 shipped — the in-place major upgrade left libnpmpublish without
      # its `sigstore` dep and every provenance publish died with
      # MODULE_NOT_FOUND. 11.x is the line the OIDC flow was verified on.
      # Revisit the pin deliberately, not by riding `latest` into a new major.
      - run: npm install -g npm@11
      - run: npm install
      - run: npm run build
      # Auth via GitHub OIDC — no NPM_TOKEN. Requires a Trusted Publisher for
      # this repo/workflow configured on npmjs.com (Package → Settings). Nothing
      # to rotate, nothing expires.
      - run: npm publish --provenance --access public
